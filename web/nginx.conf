server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Clean URLs: /visitor → /visitor.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;

    gzip on;
    gzip_types text/html text/css application/javascript;
}
